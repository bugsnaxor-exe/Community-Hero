name: community_hero_app
description: A production-ready Flutter application for Community Hero
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  dio: ^5.4.3+1
  go_router: ^14.0.0
  responsive_builder: ^0.7.0
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0
  geolocator: ^13.0.1
  image_picker: ^1.1.2
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  flutter_map_marker_cluster: ^1.1.1
  share_plus: ^10.1.3
  fl_chart: ^0.66.0
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  freezed: ^2.5.2
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
