name: Build Android APK

on:
  workflow_dispatch: # Allows you to manually trigger the build
  push:
    branches:
      - main
    paths:
      - 'community_hero_app/**'

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Get dependencies
        working-directory: ./community_hero_app
        run: flutter pub get

      - name: Build APK
        working-directory: ./community_hero_app
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: community-hero-apk
          path: community_hero_app/build/app/outputs/flutter-apk/app-release.apk
